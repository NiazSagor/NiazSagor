name: Update Open Source Contributions

on:
  schedule:
    - cron: "0 0 * * *" # runs daily
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate contributed repos
        run: |
          curl -s https://api.github.com/search/issues?q=author:NiazSagor+is:pr+is:merged+is:public \
          | jq -r '.items[].repository_url' \
          | sed 's#https://api.github.com/repos/##' \
          | sort -u \
          | awk '{print "- https://github.com/"$0}' > contributions.txt

      - name: Update README
  run: |
    awk '
    BEGIN {inside=0}
    /<!--START_CONTRIB-->/ {
        print "<!--START_CONTRIB-->"
        while ((getline line < "contributions.txt") > 0) print line
        inside=1
        next
    }
    /<!--END_CONTRIB-->/ {
        print "<!--END_CONTRIB-->"
        inside=0
        next
    }
    !inside {print}
    ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update contributions" || echo "No changes"
          git push
